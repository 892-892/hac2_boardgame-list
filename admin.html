<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { }
      return;
    }

    if (hasAndroidBridge()) {
      try {
        var p = payload || {};
        p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
        window[ANDROID_BRIDGE_NAME].postEvent(
          eventName,
          JSON.stringify(p)
        );
      } catch (e) { }
      return;
    }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
</style>
</head>

<body class="bg-white text-neutral-900">

<!-- パスワードロック -->
<div id="lock" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-[320px] border border-neutral-200 rounded-2xl p-6">
    <h1 class="text-[15px] font-medium mb-1">管理ページ</h1>
    <p class="text-[12px] text-neutral-600 mb-4">パスワードを入力してください</p>
    <input id="pw" type="password" class="w-full border border-neutral-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10" placeholder="••••••••" autofocus>
    <button id="pwBtn" class="mt-3 w-full bg-neutral-900 text-white text-sm rounded-xl py-2 hover:bg-black">入る</button>
    <p id="pwErr" class="text-[11px] text-red-600 mt-2 h-4"></p>
  </div>
</div>

<div class="max-w-[1280px] mx-auto px-4 py-6 md:py-10">
  <header class="mb-6 md:mb-8 flex items-start justify-between">
    <div>
      <h1 class="text-2xl md:text-[28px] font-semibold tracking-tight">🎲 コレクション編集</h1>
      <p class="text-sm text-neutral-600 mt-1">ゲームを追加・編集してJSONを書き出し</p>
    </div>
    <a href="index.html" class="text-[12px] text-neutral-600 hover:text-neutral-900 border border-neutral-200 rounded-lg px-3 py-1.5 whitespace-nowrap bg-white">← 一覧に戻る</a>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 items-start">
    <!-- 左：フォーム -->
    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <h2 class="text-sm font-medium mb-4">ゲーム情報</h2>
      <form id="form" class="space-y-3">
        <input type="hidden" id="id">
        
        <div>
          <label class="text-[12px] text-neutral-600">ゲーム名</label>
          <input id="name" required class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10">
        </div>
        
        <div>
          <label class="text-[12px] text-neutral-600">URL</label>
          <input id="url" type="url" placeholder="https://boardgamegeek.com/..." class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">プレイ人数（自動）</label>
            <input id="players" readonly class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm bg-neutral-100 text-neutral-600" placeholder="最小・最大から自動">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">プレイ時間</label>
            <input id="time" readonly class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm bg-neutral-100 text-neutral-600" placeholder="自動">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">最小人数</label>
            <input id="pmin" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">最大人数</label>
            <input id="pmax" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">最小時間（分）</label>
            <input id="tmin" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">最大時間（分）</label>
            <input id="tmax" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">重さ(1-5)</label>
            <input id="weight" type="number" min="1" max="5" step="0.1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">画像ファイル名</label>
            <input id="img" placeholder="12345.jpg" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>

        <!-- ★ジャンル追加 -->
        <div>
          <label class="text-[12px] text-neutral-600">ジャンル（改行区切り）</label>
          <textarea id="genres" rows="3" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10"></textarea>
        </div>

        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-neutral-900 text-white text-sm rounded-lg py-2 hover:bg-black">保存</button>
          <button type="button" id="clearBtn" class="px-4 border border-neutral-200 rounded-lg text-sm hover:bg-neutral-50">クリア</button>
          <button type="button" id="deleteBtn" class="px-4 border border-red-200 text-red-600 rounded-lg text-sm hover:bg-red-50 hidden">削除</button>
        </div>
      </form>
    </section>

    <!-- 右：一覧 -->
    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-medium">ゲーム一覧 <span class="text-neutral-500">(<span id="count">0</span>件)</span></h2>
        <div class="flex gap-2">
          <button id="exportBtn" class="text-[12px] bg-emerald-600 text-white rounded-lg px-3 py-1.5 hover:bg-emerald-700">JSONコピー</button>
        </div>
      </div>
      
      <input id="search" placeholder="ゲーム名で検索..." class="w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-neutral-900/10">
      
      <div id="list" class="space-y-1 max-h-[600px] overflow-y-auto -mx-2 px-2"></div>
    </section>
  </main>
</div>


<script>
(function() {

const PASS = '1111';
let games = [];
let editingIdx = -1;

const $ = id => document.getElementById(id);

function unlock() {
  if ($('pw').value === PASS) {
    $('lock').style.display = 'none';
    loadGames();
  } else {
    $('pwErr').textContent = 'パスワードが違います';
  }
}

$('pwBtn').addEventListener('click', unlock);
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

async function loadGames() {
  try {
    const res = await fetch('games.json?v=' + Date.now(), { cache: 'no-store' });
    games = await res.json();
  } catch (e) {
    games = [];
  }
  renderList();
  updateCount();
}

function updateCount() {
  $('count').textContent = games.length;
}

function updatePlayers() {
  const min = parseInt($('pmin').value) || '';
  const max = parseInt($('pmax').value) || '';

  if (min && max) {
    $('players').value = (min === max) ? String(min) : `${min}～${max}`;
  } else if (min) {
    $('players').value = String(min);
  } else if (max) {
    $('players').value = String(max);
  } else {
    $('players').value = '';
  }
}

function updateTime() {
  const min = parseInt($('tmin').value) || '';
  const max = parseInt($('tmax').value) || '';

  if (min && max) {
    $('time').value = (min === max) ? `${min}分` : `${min}-${max}分`;
  } else if (min) {
    $('time').value = `${min}分`;
  } else if (max) {
    $('time').value = `${max}分`;
  } else {
    $('time').value = '';
  }
}

$('pmin').addEventListener('input', updatePlayers);
$('pmax').addEventListener('input', updatePlayers);
$('tmin').addEventListener('input', updateTime);
$('tmax').addEventListener('input', updateTime);

function renderList() {
  const q = $('search').value.toLowerCase();
  const filtered = q ? games.filter(g => g.name.toLowerCase().includes(q)) : games;

  $('list').innerHTML = filtered.map(g => {
    const idx = games.indexOf(g);
    return `
      <div class="flex items-center gap-2.5 p-2 rounded-lg hover:bg-neutral-50 cursor-pointer" onclick="editGame(${idx})">
        <img src="images/${g.img}" class="w-10 h-10 rounded object-cover bg-neutral-100">
        <div class="flex-1 min-w-0">
          <div class="text-[13px] truncate">${g.name}</div>
          <div class="text-[11px] text-neutral-500">${g.players || ''} · ${g.time || ''}</div>
        </div>
      </div>
    `;
  }).join('');
}

window.editGame = function(idx) {
  const g = games[idx];
  editingIdx = idx;

  $('id').value = g.id || '';
  $('name').value = g.name || '';
  $('url').value = g.url || '';

  $('pmin').value = g.pmin || '';
  $('pmax').value = g.pmax || '';
  $('tmin').value = '';
  $('tmax').value = '';

  $('weight').value = g.weight || '';
  $('img').value = g.img || '';

  $('genres').value = (g.genres || []).join('\n');

  updatePlayers();
  updateTime();

  $('deleteBtn').classList.remove('hidden');
};

$('form').addEventListener('submit', e => {
  e.preventDefault();

  const genres = $('genres').value
    .split('\n')
    .map(v => v.trim())
    .filter(Boolean);

  const g = {
    id: parseInt($('id').value) || Date.now(),
    name: $('name').value.trim(),
    url: $('url').value.trim(),
    players: $('players').value.trim(),
    time: $('time').value.trim(),
    pmin: parseInt($('pmin').value) || 0,
    pmax: parseInt($('pmax').value) || 0,
    weight: parseFloat($('weight').value) || 1,
    img: $('img').value.trim(),
    genres
  };

  if (editingIdx >= 0) games[editingIdx] = g;
  else games.push(g);

  games.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

  renderList();
  updateCount();

  e.target.reset();
  $('genres').value = '';
  $('players').value = '';
  $('time').value = '';

  editingIdx = -1;
  $('deleteBtn').classList.add('hidden');
});

$('clearBtn').addEventListener('click', () => {
  $('form').reset();
  $('genres').value = '';
  $('players').value = '';
  $('time').value = '';
  editingIdx = -1;
  $('deleteBtn').classList.add('hidden');
});

$('search').addEventListener('input', renderList);

$('exportBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(JSON.stringify(games, null, 2));
});

})();
</script>

</body>
</html>
