<!DOCTYPE html>
<html lang="ja">

<!-- Playables SDK -->
<script>// Playables SDK v1.0.0
(function() {
  'use strict';
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) {}
      return;
    }

    if (hasAndroidBridge()) {
      try {
        var p = payload || {};
        p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
        window[ANDROID_BRIDGE_NAME].postEvent(eventName, JSON.stringify(p));
      } catch (e) {}
      return;
    }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) {}
      return;
    }
  }

  function onFrame() {
    if (gameReadySent) return;
    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }
    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', { score: score, completed: true });
    }
  };

  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif
}
</style>
</head>

<body class="bg-white text-neutral-900">

<div id="lock" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-[320px] border border-neutral-200 rounded-2xl p-6">
    <h1 class="text-[15px] font-medium mb-1">管理ページ</h1>
    <p class="text-[12px] text-neutral-600 mb-4">パスワードを入力してください</p>
    <input id="pw" type="password" class="w-full border border-neutral-200 rounded-xl px-3 py-2 text-sm" autofocus>
    <button id="pwBtn" class="mt-3 w-full bg-neutral-900 text-white text-sm rounded-xl py-2">入る</button>
    <p id="pwErr" class="text-[11px] text-red-600 mt-2 h-4"></p>
  </div>
</div>

<div class="max-w-[1280px] mx-auto px-4 py-6 md:py-10">
  <header class="mb-6 md:mb-8 flex items-start justify-between">
    <div>
      <h1 class="text-2xl md:text-[28px] font-semibold tracking-tight">🎲 コレクション編集</h1>
      <p class="text-sm text-neutral-600 mt-1">ゲームを追加・編集してJSONを書き出し</p>
    </div>
    <a href="index.html" class="text-[12px] text-neutral-600 border border-neutral-200 rounded-lg px-3 py-1.5">← 一覧に戻る</a>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 items-start">
    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <form id="form" class="space-y-3">
        <input type="hidden" id="id">

        <input id="name" required placeholder="ゲーム名" class="w-full border rounded-lg px-3 py-2 text-sm">
        <input id="url" placeholder="URL" class="w-full border rounded-lg px-3 py-2 text-sm">

        <input id="players" readonly placeholder="人数" class="w-full border rounded-lg px-3 py-2 text-sm bg-neutral-100">
        <input id="time" readonly placeholder="時間" class="w-full border rounded-lg px-3 py-2 text-sm bg-neutral-100">

        <div class="grid grid-cols-2 gap-3">
          <input id="pmin" type="number" placeholder="最小人数" class="border rounded-lg px-3 py-2 text-sm">
          <input id="pmax" type="number" placeholder="最大人数" class="border rounded-lg px-3 py-2 text-sm">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <input id="tmin" type="number" placeholder="最小時間" class="border rounded-lg px-3 py-2 text-sm">
          <input id="tmax" type="number" placeholder="最大時間" class="border rounded-lg px-3 py-2 text-sm">
        </div>

        <input id="weight" type="number" step="0.1" placeholder="重さ" class="w-full border rounded-lg px-3 py-2 text-sm">
        <input id="img" placeholder="画像ファイル名" class="w-full border rounded-lg px-3 py-2 text-sm">

        <!-- 追加 -->
        <input id="genre" placeholder="ジャンル（例：戦略 / パーティー）" class="w-full border rounded-lg px-3 py-2 text-sm">

        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-neutral-900 text-white rounded-lg py-2 text-sm">保存</button>
          <button type="button" id="clearBtn" class="px-4 border rounded-lg text-sm">クリア</button>
          <button type="button" id="deleteBtn" class="px-4 border text-red-600 rounded-lg text-sm hidden">削除</button>
        </div>
      </form>
    </section>

    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <input id="search" placeholder="検索" class="w-full border rounded-lg px-3 py-2 text-sm mb-3">
      <div id="list" class="space-y-1"></div>
    </section>
  </main>
</div>

<script>
(function() {
  const PASS = '1111';

  function $(id){ return document.getElementById(id); }

  let games = [];
  let editingIdx = -1;

  $('pwBtn').onclick = () => {
    if ($('pw').value === PASS) {
      $('lock').style.display = 'none';
      loadGames();
    } else {
      $('pwErr').textContent = 'パスワードが違います';
    }
  };

  async function loadGames() {
    const res = await fetch('games.json?v=' + Date.now());
    games = await res.json();
    renderList();
  }

  function renderList() {
    $('list').innerHTML = games.map((g, idx) => `
      <div onclick="editGame(${idx})" class="p-2 border rounded cursor-pointer">
        ${g.name} <span class="text-xs text-neutral-500">${g.genre || ''}</span>
      </div>
    `).join('');
  }

  window.editGame = function(idx) {
    const g = games[idx];
    editingIdx = idx;

    $('id').value = g.id || '';
    $('name').value = g.name || '';
    $('url').value = g.url || '';
    $('players').value = g.players || '';
    $('time').value = g.time || '';
    $('pmin').value = g.pmin || '';
    $('pmax').value = g.pmax || '';
    $('weight').value = g.weight || '';
    $('img').value = g.img || '';
    $('genre').value = g.genre || '';
  };

  $('form').addEventListener('submit', e => {
    e.preventDefault();

    const g = {
      id: parseInt($('id').value) || Date.now(),
      name: $('name').value.trim(),
      url: $('url').value.trim(),
      players: $('players').value.trim(),
      time: $('time').value.trim(),
      pmin: parseInt($('pmin').value) || 0,
      pmax: parseInt($('pmax').value) || 0,
      weight: parseFloat($('weight').value) || 1,
      img: $('img').value.trim(),
      genre: $('genre').value.trim()
    };

    if (editingIdx >= 0) games[editingIdx] = g;
    else games.push(g);

    renderList();
    e.target.reset();
    editingIdx = -1;
  });
})();
</script>

</body>
</html>
