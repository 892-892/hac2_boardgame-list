<script>// Playables SDK v1.0.0
(function() {
  'use strict';
  if (window.playablesSDK) return;
  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;
  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  function hasIOSBridge() {
    return !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[HANDLER_NAME]);
  }
  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] && typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }
  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }
  function sendEvent(eventName, payload) {
    var message = { type: eventName, payload: payload || {}, timestamp: Date.now() };
    if (hasIOSBridge()) {
      try { window.webkit.messageHandlers[HANDLER_NAME].postMessage(message); } catch (e) {} return;
    }
    if (hasAndroidBridge()) {
      try {
        var p = payload || {};
        p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
        window[ANDROID_BRIDGE_NAME].postEvent(eventName, JSON.stringify(p));
      } catch (e) {} return;
    }
    if (isInIframe()) {
      try { window.parent.postMessage(message, '*'); } catch (e) {} return;
    }
  }

  function onFrame() {
    if (gameReadySent) return;
    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', { frame_count: frameCount, detected_at: Date.now() });
      return;
    }
    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', { frame_count: frameCount, detected_at: Date.now() });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];
    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);
      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }
    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', { message: event.message || 'Unknown error', source: event.filename || '', lineno: event.lineno || 0, colno: event.colno || 0, auto_captured: true });
  });

  window.playablesSDK = {
    complete: function(score) { sendEvent('game_ended', { score: score, completed: true }); },
    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', { message: message || 'Unknown error', auto_captured: false });
    },
    sendEvent: function(eventName, payload) { if (!eventName || typeof eventName !== 'string') return; sendEvent(eventName, payload); }
  };
  if (originalRAF) originalRAF.call(window, onFrame);
})();</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
.genre-item:checked + label { background-color: #171717; color: white; border-color: #171717; }
</style>
</head>
<body class="bg-white text-neutral-900">
<div id="lock" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-[320px] border border-neutral-200 rounded-2xl p-6">
    <h1 class="text-[15px] font-medium mb-1">管理ページ</h1>
    <p class="text-[12px] text-neutral-600 mb-4">パスワードを入力してください</p>
    <input id="pw" type="password" class="w-full border border-neutral-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10" placeholder="••••••••" autofocus>
    <button id="pwBtn" class="mt-3 w-full bg-neutral-900 text-white text-sm rounded-xl py-2 hover:bg-black">入る</button>
    <p id="pwErr" class="text-[11px] text-red-600 mt-2 h-4"></p>
  </div>
</div>

<div class="max-w-[1280px] mx-auto px-4 py-6 md:py-10">
  <header class="mb-6 md:mb-8 flex items-start justify-between">
    <div>
      <h1 class="text-2xl md:text-[28px] font-semibold tracking-tight">🎲 コレクション編集</h1>
      <p class="text-sm text-neutral-600 mt-1">ゲームを追加・編集してJSONを書き出し</p>
    </div>
    <a href="index.html" class="text-[12px] text-neutral-600 hover:text-neutral-900 border border-neutral-200 rounded-lg px-3 py-1.5 whitespace-nowrap bg-white">← 一覧に戻る</a>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 items-start">
    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <h2 class="text-sm font-medium mb-4">ゲーム情報</h2>
      <form id="form" class="space-y-3">
        <input type="hidden" id="id">
        <div>
          <label class="text-[12px] text-neutral-600">ゲーム名</label>
          <input id="name" required class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10">
        </div>
        <div>
          <label class="text-[12px] text-neutral-600">URL</label>
          <input id="url" type="url" placeholder="https://boardgamegeek.com/..." class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900/10">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">人数表示（自動）</label>
            <input id="players" readonly class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm bg-neutral-100 text-neutral-600">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">時間表示（自動）</label>
            <input id="time" readonly class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm bg-neutral-100 text-neutral-600">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">最小人数</label>
            <input id="pmin" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">最大人数</label>
            <input id="pmax" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">最小時間</label>
            <input id="tmin" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">最大時間</label>
            <input id="tmax" type="number" min="1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">重さ(1-5)</label>
            <input id="weight" type="number" min="1" max="5" step="0.1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">画像名</label>
            <input id="img" placeholder="12345.jpg" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>

        <div>
          <label class="text-[12px] text-neutral-600">ジャンル（複数選択可）</label>
          <div id="genre-container" class="flex flex-wrap gap-1.5 mt-1.5">
            </div>
        </div>

        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-neutral-900 text-white text-sm rounded-lg py-2 hover:bg-black">保存</button>
          <button type="button" id="clearBtn" class="px-4 border border-neutral-200 rounded-lg text-sm hover:bg-neutral-50">クリア</button>
          <button type="button" id="deleteBtn" class="px-4 border border-red-200 text-red-600 rounded-lg text-sm hover:bg-red-50 hidden">削除</button>
        </div>
      </form>
    </section>

    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-medium">ゲーム一覧 <span class="text-neutral-500">(<span id="count">0</span>件)</span></h2>
        <button id="exportBtn" class="text-[12px] bg-emerald-600 text-white rounded-lg px-3 py-1.5 hover:bg-emerald-700">JSONコピー</button>
      </div>
      <input id="search" placeholder="ゲーム名で検索..." class="w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-neutral-900/10">
      <div id="list" class="space-y-1 max-h-[600px] overflow-y-auto -mx-2 px-2"></div>
    </section>
  </main>
</div>

<script>
(function() {
  const PASS = '1111';
  const MASTER_GENRES = ['戦略', 'ファミリー', 'パーティー', '協力', '対戦', 'カード', 'ダイス', 'タイル', '拡大再生産', 'ドラフト', 'ブラフ', '正体隠匿', '重量級', '中量級', '軽量級'];
  
  const lock = document.getElementById('lock');
  const pw = document.getElementById('pw');
  const pwBtn = document.getElementById('pwBtn');
  const pwErr = document.getElementById('pwErr');
  
  function unlock() {
    if (pw.value === PASS) {
      lock.style.display = 'none';
      initGenres();
      loadGames();
    } else {
      pwErr.textContent = 'パスワードが違います';
      pw.select();
    }
  }
  
  pwBtn.addEventListener('click', unlock);
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  
  let games = [];
  let editingIdx = -1;

  function initGenres() {
    const container = document.getElementById('genre-container');
    container.innerHTML = MASTER_GENRES.map(g => `
      <div class="inline-block">
        <input type="checkbox" id="g-${g}" value="${g}" class="genre-item hidden">
        <label for="g-${g}" class="cursor-pointer border border-neutral-200 rounded-full px-3 py-1 text-[11px] hover:border-neutral-400 block select-none transition-colors">${g}</label>
      </div>
    `).join('');
  }
  
  async function loadGames() {
    try {
      const res = await fetch('games.json?v=' + Date.now(), {cache: 'no-store'});
      if (!res.ok) throw new Error();
      games = await res.json();
    } catch (e) {
      console.warn('games.json not found, starting fresh');
      games = [];
    }
    renderList();
    updateCount();
  }
  
  function $(id) { return document.getElementById(id); }
  function updateCount() { $('count').textContent = games.length; }
  
  function updateAutoFields() {
    const pmin = parseInt($('pmin').value) || 0;
    const pmax = parseInt($('pmax').value) || 0;
    $('players').value = (pmin && pmax) ? (pmin === pmax ? pmin + '人' : pmin + '〜' + pmax + '人') : '';
    
    const tmin = parseInt($('tmin').value) || 0;
    const tmax = parseInt($('tmax').value) || 0;
    $('time').value = (tmin && tmax) ? (tmin === tmax ? tmin + '分' : tmin + '〜' + tmax + '分') : '';
  }

  $('pmin').addEventListener('input', updateAutoFields);
  $('pmax').addEventListener('input', updateAutoFields);
  $('tmin').addEventListener('input', updateAutoFields);
  $('tmax').addEventListener('input', updateAutoFields);
  $('url').addEventListener('blur', () => {
    const m = $('url').value.match(/boardgamegeek\.com\/boardgame\/(\d+)/i);
    if (m) {
      $('id').value = m[1];
      if (!$('img').value) $('img').value = m[1] + '.jpg';
    }
  });

  function renderList() {
    const q = $('search').value.toLowerCase();
    const filtered = q ? games.filter(g => g.name.toLowerCase().includes(q)) : games;
    $('list').innerHTML = filtered.map(g => {
      const idx = games.indexOf(g);
      return `<div class="flex items-center gap-2.5 p-2 rounded-lg hover:bg-neutral-50 cursor-pointer" onclick="editGame(${idx})">
        <img src="images/${g.img}" class="w-10 h-10 rounded object-cover bg-neutral-100" onerror="this.style.opacity='0.3'">
        <div class="flex-1 min-w-0">
          <div class="text-[13px] truncate font-medium">${g.name}</div>
          <div class="text-[11px] text-neutral-500">${g.players || '-'} · ${g.time || '-'}</div>
        </div>
      </div>`;
    }).join('');
  }

  window.editGame = function(idx) {
    const g = games[idx];
    editingIdx = idx;
    $('id').value = g.id || '';
    $('name').value = g.name || '';
    $('url').value = g.url || '';
    $('pmin').value = g.pmin || '';
    $('pmax').value = g.pmax || '';
    $('weight').value = g.weight || '';
    $('img').value = g.img || '';
    
    if (g.time) {
      const ts = g.time.match(/\d+/g);
      if (ts) { $('tmin').value = ts[0]; $('tmax').value = ts[1] || ts[0]; }
    }
    
    const selected = g.genre || [];
    document.querySelectorAll('.genre-item').forEach(cb => cb.checked = selected.includes(cb.value));
    
    updateAutoFields();
    $('deleteBtn').classList.remove('hidden');
    $('name').focus();
  };

  $('form').addEventListener('submit', e => {
    e.preventDefault();
    const selectedGenres = Array.from(document.querySelectorAll('.genre-item:checked')).map(cb => cb.value);
    
    const g = {
      id: parseInt($('id').value) || Date.now(),
      name: $('name').value.trim(),
      url: $('url').value.trim(),
      players: $('players').value,
      time: $('time').value,
      pmin: parseInt($('pmin').value) || 0,
      pmax: parseInt($('pmax').value) || 0,
      weight: parseFloat($('weight').value) || 1,
      img: $('img').value.trim(),
      genre: selectedGenres
    };
    
    if (editingIdx >= 0) games[editingIdx] = g;
    else games.push(g);
    
    games.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
    renderList();
    updateCount();
    clearForm();
  });

  function clearForm() {
    $('form').reset();
    document.querySelectorAll('.genre-item').forEach(cb => cb.checked = false);
    editingIdx = -1;
    $('deleteBtn').classList.add('hidden');
  }

  $('clearBtn').addEventListener('click', clearForm);
  $('deleteBtn').addEventListener('click', () => {
    if (editingIdx >= 0 && confirm('削除しますか？')) {
      games.splice(editingIdx, 1);
      renderList();
      updateCount();
      clearForm();
    }
  });
  
  $('search').addEventListener('input', renderList);
  $('exportBtn').addEventListener('click', () => {
    const json = JSON.stringify(games, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      const b = $('exportBtn');
      const t = b.textContent;
      b.textContent = 'コピー完了!';
      setTimeout(() => b.textContent = t, 1500);
    });
  });
})();
</script>
</body>
</html>
