<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

let games = [];
let selectedId = null;

const $ = id => document.getElementById(id);
const f_name = $('f_name'), f_url = $('f_url'), f_players = $('f_players'), f_time = $('f_time'), f_weight = $('f_weight'), f_id = $('f_id'), f_img = $('f_img');
const btnAdd = $('btnAdd'), btnUpdate = $('btnUpdate'), btnDelete = $('btnDelete'), btnClear = $('btnClear');
const listEl = $('list'), searchEl = $('search'), countEl = $('count'), selectedInfo = $('selectedInfo');
const output = $('output');

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(()=> t.style.opacity = '0', 1800);
}

function parsePlayers(s){
  s = (s||'').replace(/[〜～−－]/g,'~').replace(/-/g,'~');
  const m = s.match(/(\d+)\s*~\s*(\d+)/);
  if(m) return {pmin:+m[1], pmax:+m[2]};
  const n = s.match(/(\d+)/);
  if(n) return {pmin:+n[1], pmax:+n[1]};
  return {pmin:1,pmax:1};
}

function save(){
  localStorage.setItem('bg_games', JSON.stringify(games));
}

function loadInitial(){
  const stored = localStorage.getItem('bg_games');
  if(stored){
    try{ games = JSON.parse(stored); } catch{ games = initialGames.slice(); }
  }else{
    games = initialGames.slice();
  }
  games.sort((a,b)=> a.id - b.id);
  render();
}

function render(){
  const q = searchEl.value.trim().toLowerCase();
  const filtered = q ? games.filter(g => g.name.toLowerCase().includes(q) || String(g.id).includes(q)) : games;
  countEl.textContent = `${filtered.length}件 / 全${games.length}件`;
  listEl.innerHTML = '';
  filtered.forEach(g=>{
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'w-full text-left flex gap-3 p-2.5 hover:bg-neutral-50 focus:bg-neutral-50 outline-none';
    item.dataset.id = g.id;
    if(selectedId === g.id) item.classList.add('bg-neutral-50');
    item.innerHTML = `
      <img src="images/${g.id}.jpg" alt="" class="w-12 h-12 object-cover rounded-lg border border-neutral-200 bg-neutral-100 shrink-0" onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23f5f5f5%22/><text x=%2250%25%22 y=%2255%25%22 font-size=%2210%22 text-anchor=%22middle%22 fill=%22%23999%22>no</text></svg>'">
      <div class="min-w-0 flex-1">
        <div class="text-sm truncate">${escapeHtml(g.name)}</div>
        <div class="text-[11px] text-neutral-500 mt-0.5">${escapeHtml(g.players)} ・ ${escapeHtml(g.time)} ・ 重さ${g.weight} ・ ID:${g.id}</div>
      </div>
    `;
    item.addEventListener('click', ()=> selectGame(g.id));
    listEl.appendChild(item);
  });
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function selectGame(id){
  const g = games.find(x=> x.id === id);
  if(!g) return;
  selectedId = id;
  f_name.value = g.name;
  f_url.value = g.url;
  f_players.value = g.players;
  f_time.value = g.time;
  f_weight.value = g.weight;
  f_id.value = g.id;
  f_img.value = g.img;
  f_img.dataset.auto = '1';
  btnUpdate.disabled = false;
  btnDelete.disabled = false;
  selectedInfo.textContent = `選択中: ${g.name} (ID:${g.id})`;
  render();
}

function clearForm(){
  selectedId = null;
  f_name.value = '';
  f_url.value = '';
  f_players.value = '';
  f_time.value = '';
  f_weight.value = '2';
  f_id.value = '';
  f_img.value = '';
  f_img.dataset.auto = '1';
  btnUpdate.disabled = true;
  btnDelete.disabled = true;
  selectedInfo.textContent = '';
  render();
  // suggest next id
  const maxId = games.reduce((m,g)=> Math.max(m, g.id||0), 0);
  if(maxId) f_id.value = maxId + 1;
  if(f_id.value) f_img.value = f_id.value + '.jpg';
}

function getFormData(){
  const id = Number(f_id.value);
  const {pmin,pmax} = parsePlayers(f_players.value);
  return {
    name: f_name.value.trim(),
    url: f_url.value.trim(),
    players: f_players.value.trim(),
    pmin, pmax,
    time: f_time.value.trim(),
    weight: Number(f_weight.value),
    id,
    img: f_img.value.trim() || (id + '.jpg')
  };
}

function validate(d){
  if(!d.name) return '名前を入力してください';
  if(!d.url) return 'URLを入力してください';
  if(!d.players) return 'プレイ人数を入力してください';
  if(!d.time) return 'プレイ時間を入力してください';
  if(!d.id || d.id < 1) return 'IDを正しく入力してください';
  return null;
}

btnAdd.addEventListener('click', ()=>{
  const d = getFormData();
  const err = validate(d);
  if(err){ toast(err); return; }
  if(games.some(g=> g.id === d.id)){ toast('同じIDが既に存在します'); return; }
  games.push(d);
  games.sort((a,b)=> a.id - b.id);
  save();
  render();
  toast('追加しました');
  selectGame(d.id);
});

btnUpdate.addEventListener('click', ()=>{
  if(selectedId === null) return;
  const d = getFormData();
  const err = validate(d);
  if(err){ toast(err); return; }
  if(d.id !== selectedId && games.some(g=> g.id === d.id)){ toast('変更後のIDが重複しています'); return; }
  const idx = games.findIndex(g=> g.id === selectedId);
  if(idx >= 0){
    games[idx] = d;
    selectedId = d.id;
    games.sort((a,b)=> a.id - b.id);
    save();
    render();
    toast('更新しました');
    selectGame(d.id);
  }
});

btnDelete.addEventListener('click', ()=>{
  if(selectedId === null) return;
  if(!confirm('削除しますか？')) return;
  games = games.filter(g=> g.id !== selectedId);
  save();
  toast('削除しました');
  clearForm();
  render();
});

btnClear.addEventListener('click', clearForm);

searchEl.addEventListener('input', render);

f_id.addEventListener('input', ()=>{
  if(f_img.dataset.auto !== '0'){
    f_img.value = f_id.value ? f_id.value + '.jpg' : '';
    f_img.dataset.auto = '1';
  }
});
f_img.addEventListener('input', ()=>{ f_img.dataset.auto = '0'; });

$('btnLoad').addEventListener('click', ()=>{
  if(confirm('localStorageのデータを読み込みます。現在の編集内容は破棄されます。')){
    loadInitial();
    toast('読み込みました');
    clearForm();
  }
});

$('btnExport').addEventListener('click', ()=>{
  const json = JSON.stringify(games, null, 2);
  output.value = json;
  toast('JSONを生成しました');
});

$('btnCopy').addEventListener('click', async ()=>{
  try{
    await navigator.clipboard.writeText(output.value);
    toast('コピーしました');
  }catch{ toast('コピー失敗'); }
});

$('btnDownload').addEventListener('click', ()=>{
  const blob = new Blob([output.value || JSON.stringify(games,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'games.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('ダウンロード開始');
});

$('btnBase64').addEventListener('click', ()=>{
  const json = JSON.stringify(games);
  // UTF-8 safe base64
  const b64 = btoa(unescape(encodeURIComponent(json)));
  output.value = b64;
  toast('base64生成完了');
});

// lock
const PASS = '1234'; // 簡単にしました
const lock = document.getElementById('lock');
const pw = document.getElementById('pw');
const pwBtn = document.getElementById('pwBtn');
const pwErr = document.getElementById('pwErr');

function unlock(){
  console.log('input:', pw.value, 'expected:', PASS);
  if(pw.value.trim() === PASS){
    sessionStorage.setItem('bg_admin_ok','1');
    lock.remove(); // completely remove
  }else{
    pwErr.textContent='パスワードが違います: ' + pw.value;
    pw.select();
  }
}
pwBtn.addEventListener('click', unlock);
pw.addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });

// Always require password

// init
if (location.search.includes('reset')) {
  localStorage.removeItem('bg_games');
}
loadInitial();
clearForm();
</script>
</body>
