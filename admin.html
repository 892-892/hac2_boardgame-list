<!DOCTYPE html>
<html lang="ja">
<head>
<script>// Playables SDK v1.0.0

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}</style>
</head>
<body class="bg-white text-neutral-900">

<div id="lock" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-[320px] border border-neutral-200 rounded-2xl p-6">
    <h1 class="text-[15px] font-medium mb-1">管理ページ</h1>
    <p class="text-[12px] text-neutral-600 mb-4">パスワードを入力してください</p>
    <input id="pw" type="password" class="w-full border border-neutral-200 rounded-xl px-3 py-2 text-sm focus:outline-none" placeholder="••••••••" autofocus>
    <button id="pwBtn" class="mt-3 w-full bg-neutral-900 text-white text-sm rounded-xl py-2">入る</button>
    <p id="pwErr" class="text-[11px] text-red-600 mt-2 h-4"></p>
  </div>
</div>

<div class="max-w-[1280px] mx-auto px-4 py-6 md:py-10">
  <header class="mb-6 flex items-start justify-between">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight">🎲 コレクション編集</h1>
      <p class="text-sm text-neutral-600 mt-1">ゲームを追加・編集してJSONを書き出し</p>
    </div>
    <a href="index.html" class="text-[12px] text-neutral-600 border border-neutral-200 rounded-lg px-3 py-1.5 bg-white">← 一覧に戻る</a>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <h2 class="text-sm font-medium mb-4">ゲーム情報</h2>
      <form id="form" class="space-y-3">
        <input type="hidden" id="id">
        <div>
          <label class="text-[12px] text-neutral-600">ゲーム名</label>
          <input id="name" required class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
        </div>
        <div>
          <label class="text-[12px] text-neutral-600">URL</label>
          <input id="url" type="url" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">最小人数</label>
            <input id="pmin" type="number" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">最大人数</label>
            <input id="pmax" type="number" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">最小時間</label>
            <input id="tmin" type="number" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">最大時間</label>
            <input id="tmax" type="number" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[12px] text-neutral-600">重さ(1-5)</label>
            <input id="weight" type="number" step="0.1" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-[12px] text-neutral-600">画像ファイル名</label>
            <input id="img" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
          </div>
        </div>
        <div>
          <label class="text-[12px] text-neutral-600">ジャンル（1行に1つずつ入力）</label>
          <textarea id="genre" rows="3" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm focus:outline-none" placeholder="協力ゲーム&#13;&#10;カードゲーム"></textarea>
        </div>
        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-neutral-900 text-white text-sm rounded-lg py-2">保存</button>
          <button type="button" id="clearBtn" class="px-4 border border-neutral-200 rounded-lg text-sm">クリア</button>
          <button type="button" id="deleteBtn" class="px-4 border border-red-200 text-red-600 rounded-lg text-sm hidden">削除</button>
        </div>
        <input type="hidden" id="players"><input type="hidden" id="time">
      </form>
    </section>

    <section class="border border-neutral-200 rounded-xl p-4 md:p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-medium">ゲーム一覧 (<span id="count">0</span>件)</h2>
        <button id="exportBtn" class="text-[12px] bg-emerald-600 text-white rounded-lg px-3 py-1.5">JSONコピー</button>
      </div>
      <input id="search" placeholder="検索..." class="w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm mb-3">
      <div id="list" class="space-y-1 max-h-[600px] overflow-y-auto"></div>
    </section>
  </main>
</div>

<script>
(function() {
  const PASS = '1111';
  const $ = id => document.getElementById(id);
  let games = [];
  let editingIdx = -1;

  function unlock() {
    if ($('pw').value === PASS) { $('lock').style.display = 'none'; loadGames(); }
    else { $('pwErr').textContent = 'パスワードが違います'; }
  }
  $('pwBtn').addEventListener('click', unlock);
  $('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

  async function loadGames() {
    try {
      const res = await fetch('games.json?v=' + Date.now(), {cache: 'no-store'});
      games = res.ok ? await res.json() : [];
    } catch (e) { games = []; }
    renderList();
    updateCount();
  }

  function updateCount() { $('count').textContent = games.length; }

  function getPlayersVal() {
    const min = parseInt($('pmin').value) || 0, max = parseInt($('pmax').value) || 0;
    if (min && max) return min === max ? String(min) : min + '～' + max;
    return min || max || '';
  }

  function getTimeVal() {
    const min = parseInt($('tmin').value) || 0, max = parseInt($('tmax').value) || 0;
    if (min && max) return min === max ? min + '分' : min + '-' + max + '分';
    return min ? min + '分' : (max ? max + '分' : '');
  }

  $('url').addEventListener('blur', () => {
    const m = $('url').value.match(/boardgamegeek\.com\/boardgame\/(\d+)/i);
    if (m && !$('img').value) { $('img').value = m[1] + '.jpg'; $('id').value = m[1]; }
  });

  function renderList() {
    const q = $('search').value.toLowerCase();
    const filtered = q ? games.filter(g => g.name.toLowerCase().includes(q)) : games;
    $('list').innerHTML = filtered.map(g => {
      const idx = games.indexOf(g);
      const tags = (g.genre && g.genre.length) ? ` · ${g.genre.join('/')}` : '';
      return `<div class="flex items-center gap-2.5 p-2 rounded-lg hover:bg-neutral-50 cursor-pointer" onclick="editGame(${idx})">
        <img src="images/${g.img}" class="w-10 h-10 rounded object-cover bg-neutral-100" onerror="this.style.opacity='0.3'">
        <div class="flex-1 min-w-0">
          <div class="text-[13px] truncate">${g.name}</div>
          <div class="text-[11px] text-neutral-500">${g.players || ''} · ${g.time || ''}${tags}</div>
        </div>
      </div>`;
    }).join('');
  }

  window.editGame = function(idx) {
    const g = games[idx];
    editingIdx = idx;
    $('id').value = g.id || '';
    $('name').value = g.name || '';
    $('url').value = g.url || '';
    $('pmin').value = g.pmin || '';
    $('pmax').value = g.pmax || '';
    $('weight').value = g.weight || '';
    $('img').value = g.img || '';
    $('genre').value = Array.isArray(g.genre) ? g.genre.join('\n') : '';
    if (g.time) {
      const nums = g.time.match(/\d+/g);
      if (nums) { $('tmin').value = nums[0] || ''; $('tmax').value = nums[1] || nums[0] || ''; }
    }
    $('deleteBtn').classList.remove('hidden');
  };

  $('form').addEventListener('submit', e => {
    e.preventDefault();
    const genreArray = $('genre').value.split('\n').map(s => s.trim()).filter(s => s !== '');
    const g = {
      id: parseInt($('id').value) || Date.now(),
      name: $('name').value.trim(),
      url: $('url').value.trim(),
      players: getPlayersVal(),
      time: getTimeVal(),
      pmin: parseInt($('pmin').value) || 0,
      pmax: parseInt($('pmax').value) || 0,
      weight: parseFloat($('weight').value) || 1,
      img: $('img').value.trim(),
      genre: genreArray
    };
    if (editingIdx >= 0) games[editingIdx] = g; else games.push(g);
    games.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
    renderList(); updateCount();
    $('form').reset(); editingIdx = -1;
    $('deleteBtn').classList.add('hidden');
  });

  $('clearBtn').addEventListener('click', () => { $('form').reset(); editingIdx = -1; $('deleteBtn').classList.add('hidden'); });
  $('deleteBtn').addEventListener('click', () => { if (confirm('削除？')) { games.splice(editingIdx, 1); renderList(); updateCount(); $('form').reset(); editingIdx = -1; $('deleteBtn').classList.add('hidden'); } });
  $('search').addEventListener('input', renderList);
  $('exportBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(JSON.stringify(games, null, 2)).then(() => {
      const b = $('exportBtn'); b.textContent = '完了'; setTimeout(() => b.textContent = 'JSONコピー', 1000);
    });
  });
})();
</script>
</body>
</html>
