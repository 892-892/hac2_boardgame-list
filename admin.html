<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
</style>
</head>
<body class="bg-white text-neutral-900">

<div id="lock" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-[320px] border border-neutral-200 rounded-2xl p-6">
    <h1 class="text-[15px] font-medium mb-1">管理ページ</h1>
    <input id="pw" type="password" class="w-full border rounded-xl px-3 py-2 text-sm">
    <button id="pwBtn" class="mt-3 w-full bg-neutral-900 text-white text-sm rounded-xl py-2">入る</button>
    <p id="pwErr" class="text-[11px] text-red-600 mt-2 h-4"></p>
  </div>
</div>

<div class="max-w-[1280px] mx-auto px-4 py-6">

<form id="form" class="space-y-3">

<input type="hidden" id="id">

<input id="name" placeholder="ゲーム名" class="w-full border rounded-lg px-3 py-2 text-sm">
<input id="url" placeholder="URL" class="w-full border rounded-lg px-3 py-2 text-sm">

<input id="players" readonly class="w-full border rounded-lg px-3 py-2 text-sm bg-neutral-100">
<input id="time" readonly class="w-full border rounded-lg px-3 py-2 text-sm bg-neutral-100">

<div class="grid grid-cols-2 gap-3">
<input id="pmin" type="number" class="border rounded-lg px-3 py-2 text-sm">
<input id="pmax" type="number" class="border rounded-lg px-3 py-2 text-sm">
</div>

<div class="grid grid-cols-2 gap-3">
<input id="tmin" type="number" class="border rounded-lg px-3 py-2 text-sm">
<input id="tmax" type="number" class="border rounded-lg px-3 py-2 text-sm">
</div>

<input id="weight" type="number" step="0.1" class="w-full border rounded-lg px-3 py-2 text-sm">
<input id="img" class="w-full border rounded-lg px-3 py-2 text-sm">

<!-- ジャンル -->
<input id="genre" placeholder="ジャンル" class="w-full border rounded-lg px-3 py-2 text-sm">

<button class="w-full bg-black text-white py-2 rounded">保存</button>

</form>

<hr class="my-4">

<input id="search" placeholder="検索" class="w-full border p-2 mb-3">

<div id="list"></div>

</div>

<script>
(function() {
const PASS = '1111';
const $ = id => document.getElementById(id);

let games = [];
let editingIdx = -1;

$('pwBtn').onclick = () => {
  if ($('pw').value === PASS) {
    $('lock').style.display = 'none';
    loadGames();
  } else {
    $('pwErr').textContent = 'パスワードが違います';
  }
};

async function loadGames() {
  const res = await fetch('games.json?v=' + Date.now());
  games = await res.json();
  renderList();
}

function renderList() {
  const q = $('search').value.toLowerCase();
  $('list').innerHTML = games
    .filter(g => g.name.toLowerCase().includes(q))
    .map((g,i)=>`
      <div onclick="editGame(${i})" class="p-2 border rounded cursor-pointer">
        ${g.name}
      </div>
    `).join('');
}

window.editGame = function(i){
  const g = games[i];
  editingIdx = i;

  $('id').value = g.id || '';
  $('name').value = g.name || '';
  $('url').value = g.url || '';
  $('players').value = g.players || '';
  $('time').value = g.time || '';
  $('pmin').value = g.pmin || '';
  $('pmax').value = g.pmax || '';
  $('weight').value = g.weight || '';
  $('img').value = g.img || '';
  $('genre').value = g.genre || '';
};

$('form').addEventListener('submit', e => {
  e.preventDefault();

  const g = {
    id: parseInt($('id').value) || Date.now(),
    name: $('name').value.trim(),
    url: $('url').value.trim(),
    players: $('players').value.trim(),
    time: $('time').value.trim(),
    pmin: parseInt($('pmin').value) || 0,
    pmax: parseInt($('pmax').value) || 0,
    weight: parseFloat($('weight').value) || 1,
    img: $('img').value.trim(),
    genre: $('genre').value.trim()
  };

  if (editingIdx >= 0) games[editingIdx] = g;
  else games.push(g);

  renderList();

  // ★ここが重要（JSON書き出し）
  const blob = new Blob([JSON.stringify(games, null, 2)], {type: "application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "games.json";
  a.click();

  e.target.reset();
  editingIdx = -1;
});

$('search').addEventListener('input', renderList);

})();
</script>

</body>
</html>
