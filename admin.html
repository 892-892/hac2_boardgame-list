<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理 - ボードゲーム</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>
</head>
<body class="bg-white">
<div id="lock" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-[320px] border rounded-2xl p-6">
    <h1 class="text-[15px] font-medium mb-1">管理ページ</h1>
    <p class="text-[12px] text-neutral-600 mb-4">パスワードを入力</p>
    <input id="pw" type="password" class="w-full border rounded-xl px-3 py-2 text-sm" placeholder="••••">
    <button id="pwBtn" class="mt-3 w-full bg-black text-white text-sm rounded-xl py-2">入る</button>
    <p id="pwErr" class="text-[11px] text-red-600 mt-2 h-4"></p>
  </div>
</div>

<div class="max-w-[1280px] mx-auto px-4 py-6">
  <header class="mb-6 flex justify-between">
    <div>
      <h1 class="text-2xl font-semibold">🎲 コレクション編集</h1>
      <p class="text-sm text-neutral-600 mt-1">games.jsonを編集</p>
    </div>
    <a href="index.html" class="text-xs border rounded-lg px-3 py-1.5">← 一覧</a>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <section class="border rounded-xl p-4">
      <h2 class="text-sm font-medium mb-4">ゲーム情報</h2>
      <form id="form" class="space-y-3">
        <input type="hidden" id="id">
        <div><label class="text-xs">ゲーム名</label><input id="name" required class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></div>
        <div><label class="text-xs">URL</label><input id="url" type="url" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs">人数表記</label><input id="players" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm" placeholder="3~4"></div>
          <div><label class="text-xs">時間</label><input id="time" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm" placeholder="30分"></div>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div><label class="text-xs">最小人数</label><input id="pmin" type="number" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></div>
          <div><label class="text-xs">最大人数</label><input id="pmax" type="number" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></div>
          <div><label class="text-xs">重さ</label><input id="weight" type="number" min="1" max="5" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm"></div>
        </div>
        <div><label class="text-xs">画像</label><input id="img" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm" placeholder="12345.jpg"></div>
        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-black text-white text-sm rounded-lg py-2">保存</button>
          <button type="button" id="clear" class="px-4 border rounded-lg text-sm">クリア</button>
        </div>
      </form>
    </section>
    
    <section class="border rounded-xl p-4">
      <div class="flex justify-between mb-3">
        <h2 class="text-sm font-medium">一覧 (<span id="count">0</span>件)</h2>
        <button id="export" class="text-xs border rounded-lg px-3 py-1.5">JSON出力</button>
      </div>
      <input id="search" placeholder="検索" class="w-full border rounded-lg px-3 py-2 text-sm mb-3">
      <div id="list" class="space-y-1 max-h-[600px] overflow-y-auto text-sm"></div>
    </section>
  </main>
</div>

<script>
const PASS = '1111';
const lock = document.getElementById('lock');
const pw = document.getElementById('pw');
const pwBtn = document.getElementById('pwBtn');
const pwErr = document.getElementById('pwErr');

function unlock() {
  console.log('Unlock attempt:', pw.value);
  if (pw.value === PASS) {
    lock.style.display = 'none';
    loadGames();
  } else {
    pwErr.textContent = 'パスワードが違います';
  }
}

pwBtn.onclick = unlock;
pw.onkeydown = e => { if (e.key === 'Enter') unlock(); };

let games = [];
let editingIdx = -1;

async function loadGames() {
  try {
    const res = await fetch('games.json?v=' + Date.now());
    games = await res.json();
    console.log('Loaded', games.length);
    renderList();
  } catch (e) {
    alert('読み込み失敗: ' + e.message);
  }
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('list');
  const filtered = games.filter(g => !q || g.name.toLowerCase().includes(q));
  
  document.getElementById('count').textContent = games.length;
  
  list.innerHTML = filtered.map((g, i) => `
    <div class="flex items-center gap-2 p-2 hover:bg-neutral-50 rounded cursor-pointer" onclick="edit(${games.indexOf(g)})">
      <img src="images/${g.img}" class="w-10 h-10 object-cover rounded" onerror="this.src='https://placehold.co/40'">
      <div class="flex-1 min-w-0">
        <div class="truncate">${g.name}</div>
        <div class="text-xs text-neutral-500">${g.players} · ${g.time}</div>
      </div>
    </div>
  `).join('');
}

function edit(idx) {
  const g = games[idx];
  editingIdx = idx;
  document.getElementById('id').value = g.id || '';
  document.getElementById('name').value = g.name || '';
  document.getElementById('url').value = g.url || '';
  document.getElementById('players').value = g.players || '';
  document.getElementById('time').value = g.time || '';
  document.getElementById('pmin').value = g.pmin || '';
  document.getElementById('pmax').value = g.pmax || '';
  document.getElementById('weight').value = g.weight || '';
  document.getElementById('img').value = g.img || '';
}

document.getElementById('form').onsubmit = e => {
  e.preventDefault();
  const g = {
    id: parseInt(document.getElementById('id').value) || Date.now(),
    name: document.getElementById('name').value,
    url: document.getElementById('url').value,
    players: document.getElementById('players').value,
    time: document.getElementById('time').value,
    pmin: parseInt(document.getElementById('pmin').value) || 0,
    pmax: parseInt(document.getElementById('pmax').value) || 0,
    weight: parseInt(document.getElementById('weight').value) || 1,
    img: document.getElementById('img').value
  };
  
  if (editingIdx >= 0) {
    games[editingIdx] = g;
  } else {
    games.push(g);
  }
  
  renderList();
  document.getElementById('form').reset();
  editingIdx = -1;
};

document.getElementById('clear').onclick = () => {
  document.getElementById('form').reset();
  editingIdx = -1;
};

document.getElementById('search').oninput = renderList;

document.getElementById('export').onclick = () => {
  const json = JSON.stringify(games, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert(games.length + '件をコピーしました');
  });
  console.log(json);
};

// Auto-focus password
pw.focus();
</script>
</body>
</html>
