<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-neutral-900">

<div class="max-w-[1280px] mx-auto px-4 py-6">

  <h1 class="text-2xl font-bold mb-6">🎲 コレクション編集</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- 左：フォーム -->
    <div class="border p-4 rounded-xl">
      <form id="form" class="space-y-3">

        <input type="hidden" id="id">

        <input id="name" placeholder="ゲーム名" class="w-full border p-2 rounded">

        <input id="url" placeholder="URL" class="w-full border p-2 rounded">

        <div class="grid grid-cols-2 gap-2">
          <input id="pmin" type="number" placeholder="最小人数" class="border p-2 rounded">
          <input id="pmax" type="number" placeholder="最大人数" class="border p-2 rounded">
        </div>

        <div class="grid grid-cols-2 gap-2">
          <input id="tmin" type="number" placeholder="最小時間" class="border p-2 rounded">
          <input id="tmax" type="number" placeholder="最大時間" class="border p-2 rounded">
        </div>

        <input id="weight" type="number" placeholder="重さ" class="w-full border p-2 rounded">

        <input id="img" placeholder="画像ファイル名" class="w-full border p-2 rounded">

        <!-- ⭐ ジャンル -->
        <div>
          <label class="text-sm">ジャンル</label>

          <div class="flex gap-2 mt-1">
            <input id="genreInput" class="flex-1 border p-2 rounded">
            <button type="button" id="addGenreBtn" class="border px-3 rounded">追加</button>
          </div>

          <div id="genreList" class="flex flex-wrap gap-1 mt-2"></div>
        </div>

        <button class="w-full bg-black text-white py-2 rounded">保存</button>
      </form>
    </div>

    <!-- 右：一覧 -->
    <div class="border p-4 rounded-xl">
      <div id="list"></div>
    </div>

  </div>
</div>

<script>
let games = [];
let editingIdx = -1;
let genres = []; // ⭐ ここ重要

async function loadGames(){
  try{
    const res = await fetch('games.json?v='+Date.now());
    games = await res.json();
  }catch(e){
    games = [];
  }
  renderList();
}

function renderList(){
  const list = document.getElementById('list');

  list.innerHTML = games.map((g,i)=>`
    <div class="p-2 border-b cursor-pointer" onclick="editGame(${i})">
      ${g.name}
    </div>
  `).join('');
}

function renderGenres(){
  const list = document.getElementById('genreList');

  list.innerHTML = genres.map((g,i)=>`
    <span class="text-xs bg-gray-200 px-2 py-1 rounded flex items-center gap-1">
      ${g}
      <button onclick="removeGenre(${i})">×</button>
    </span>
  `).join('');
}

window.removeGenre = function(i){
  genres.splice(i,1);
  renderGenres();
};

document.getElementById('addGenreBtn').addEventListener('click', ()=>{
  const input = document.getElementById('genreInput');
  const val = input.value.trim();
  if(!val) return;

  genres.push(val);
  input.value = '';
  renderGenres();
});

window.editGame = function(i){
  const g = games[i];
  editingIdx = i;

  document.getElementById('name').value = g.name || '';
  document.getElementById('url').value = g.url || '';
  document.getElementById('pmin').value = g.pmin || '';
  document.getElementById('pmax').value = g.pmax || '';
  document.getElementById('tmin').value = g.tmin || '';
  document.getElementById('tmax').value = g.tmax || '';
  document.getElementById('weight').value = g.weight || '';
  document.getElementById('img').value = g.img || '';

  genres = g.genre || [];
  renderGenres();
};

document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();

  const g = {
    name: document.getElementById('name').value,
    url: document.getElementById('url').value,
    pmin: parseInt(document.getElementById('pmin').value)||0,
    pmax: parseInt(document.getElementById('pmax').value)||0,
    tmin: parseInt(document.getElementById('tmin').value)||0,
    tmax: parseInt(document.getElementById('tmax').value)||0,
    weight: parseFloat(document.getElementById('weight').value)||1,
    img: document.getElementById('img').value,
    genre: genres // ⭐ ここだけ
  };

  if(editingIdx >= 0){
    games[editingIdx] = g;
  }else{
    games.push(g);
  }

  navigator.clipboard.writeText(JSON.stringify(games,null,2));

  alert("JSONコピーしたよ");

  e.target.reset();
  genres = [];
  renderGenres();
  editingIdx = -1;

  renderList();
});

loadGames();
</script>

</body>
</html>
