<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理 - ボードゲームコレクション</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
</style>
</head>

<body class="bg-white text-neutral-900">

<div class="max-w-[1280px] mx-auto px-4 py-6 md:py-10">

<header class="mb-6 md:mb-8 flex items-start justify-between">
  <div>
    <h1 class="text-2xl md:text-[28px] font-semibold tracking-tight">🎲 コレクション編集</h1>
    <p class="text-sm text-neutral-600 mt-1">ゲームを追加・編集してJSONを書き出し</p>
  </div>
  <a href="index.html" class="text-[12px] text-neutral-600 border border-neutral-200 rounded-lg px-3 py-1.5 bg-white">← 一覧に戻る</a>
</header>

<main class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 items-start">

<!-- 左：フォーム -->
<section class="border border-neutral-200 rounded-xl p-4 md:p-6">
<form id="form" class="space-y-3">

<input type="hidden" id="id">

<div>
<label class="text-[12px] text-neutral-600">ゲーム名</label>
<input id="name" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
</div>

<div>
<label class="text-[12px] text-neutral-600">URL</label>
<input id="url" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm">
</div>

<div class="grid grid-cols-2 gap-3">
<input id="pmin" type="number" placeholder="最小人数" class="border rounded px-2 py-2 text-sm">
<input id="pmax" type="number" placeholder="最大人数" class="border rounded px-2 py-2 text-sm">
</div>

<div class="grid grid-cols-2 gap-3">
<input id="tmin" type="number" placeholder="最小時間" class="border rounded px-2 py-2 text-sm">
<input id="tmax" type="number" placeholder="最大時間" class="border rounded px-2 py-2 text-sm">
</div>

<div>
<input id="weight" type="number" placeholder="重さ" class="w-full border rounded px-2 py-2 text-sm">
</div>

<div>
<input id="img" placeholder="画像ファイル名" class="w-full border rounded px-2 py-2 text-sm">
</div>

<!-- ⭐ ジャンル（複数行入力） -->
<div>
<label class="text-[12px] text-neutral-600">ジャンル（1行に1つ）</label>
<textarea id="genre" rows="4" class="mt-1 w-full border border-neutral-200 rounded-lg px-3 py-2 text-sm"></textarea>
</div>

<div class="flex gap-2 pt-2">
<button type="submit" class="flex-1 bg-neutral-900 text-white text-sm rounded-lg py-2">保存</button>
<button type="button" id="clearBtn" class="px-4 border rounded-lg text-sm">クリア</button>
</div>

</form>
</section>

<!-- 右：一覧 -->
<section class="border border-neutral-200 rounded-xl p-4 md:p-6">
<div id="list"></div>
</section>

</main>
</div>

<script>
let games = [];
let editingIdx = -1;

// 読み込み
async function loadGames(){
  try{
    const res = await fetch('games.json?v='+Date.now());
    games = await res.json();
  }catch(e){
    games = [];
  }
  renderList();
}

// 一覧
function renderList(){
  const list = document.getElementById('list');
  list.innerHTML = games.map((g,i)=>`
    <div class="p-2 border-b cursor-pointer" onclick="editGame(${i})">
      ${g.name}
    </div>
  `).join('');
}

// 編集
window.editGame = function(i){
  const g = games[i];
  editingIdx = i;

  document.getElementById('name').value = g.name || '';
  document.getElementById('url').value = g.url || '';
  document.getElementById('pmin').value = g.pmin || '';
  document.getElementById('pmax').value = g.pmax || '';
  document.getElementById('tmin').value = g.tmin || '';
  document.getElementById('tmax').value = g.tmax || '';
  document.getElementById('weight').value = g.weight || '';
  document.getElementById('img').value = g.img || '';

  // ⭐ 配列 → 改行テキスト
  document.getElementById('genre').value = (g.genre || []).join('\n');
};

// 保存
document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();

  // ⭐ 改行 → 配列
  const genres = document.getElementById('genre').value
    .split('\n')
    .map(s => s.trim())
    .filter(Boolean);

  const g = {
    id: Date.now(),
    name: document.getElementById('name').value.trim(),
    url: document.getElementById('url').value.trim(),
    pmin: parseInt(document.getElementById('pmin').value)||0,
    pmax: parseInt(document.getElementById('pmax').value)||0,
    tmin: parseInt(document.getElementById('tmin').value)||0,
    tmax: parseInt(document.getElementById('tmax').value)||0,
    weight: parseFloat(document.getElementById('weight').value)||1,
    img: document.getElementById('img').value.trim(),
    genre: genres
  };

  if(editingIdx >= 0){
    games[editingIdx] = g;
  }else{
    games.push(g);
  }

  navigator.clipboard.writeText(JSON.stringify(games,null,2));
  alert("JSONコピーしたよ");

  e.target.reset();
  editingIdx = -1;

  renderList();
});

// クリア
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('form').reset();
  editingIdx = -1;
});

loadGames();
</script>

</body>
</html>
