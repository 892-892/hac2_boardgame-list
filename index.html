<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>892-BoardGameList</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; }
.line2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
<div class="max-w-7xl mx-auto px-4 pb-16">
  <header class="py-8 md:py-10 text-center relative">
    <div class="absolute right-0 top-8">
      <a href="admin.html" class="text-[12px] text-slate-500 hover:text-slate-900 border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white">管理</a>
    </div>
    <h1 class="text-[28px] md:text-4xl font-extrabold tracking-tight">所持ボドゲ一覧</h1>
    <p class="mt-2 text-sm text-slate-600">時間とか人数とかあってなかったらごめん</p>
  </header>

  <div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 p-4 md:p-5 mb-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
      <input id="q" placeholder="ゲーム名で検索" class="rounded-xl border border-slate-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <select id="players" class="rounded-xl border border-slate-200 px-3 py-2.5 text-sm bg-white">
        <option value="">人数: すべて</option>
        <option value="1">1人</option><option value="2">2人</option><option value="3">3人</option><option value="4">4人</option><option value="5">5人</option><option value="6">6人</option><option value="7">7人</option><option value="8">8人</option><option value="9">9人</option><option value="10">10人</option>
      </select>
      <select id="time" class="rounded-xl border border-slate-200 px-3 py-2.5 text-sm bg-white">
        <option value="">時間: すべて</option>
        <option value="0-30">〜30分</option>
        <option value="30-90">30〜90分</option>
        <option value="90+">90分〜</option>
      </select>
      <select id="weight" class="rounded-xl border border-slate-200 px-3 py-2.5 text-sm bg-white">
        <option value="">重さ: すべて</option>
        <option value="1">1 軽い</option>
        <option value="2">2</option>
        <option value="3">3 中</option>
        <option value="4">4</option>
        <option value="5">5 重い</option>
      </select>
      <select id="sort" class="rounded-xl border border-slate-200 px-3 py-2.5 text-sm bg-white">
        <option value="name">名前順</option>
        <option value="players">人数順</option>
        <option value="time">時間順</option>
        <option value="weight">重さ順</option>
      </select>
    </div>
    <div class="mt-3 text-xs text-slate-500"><span id="count">表示中: 0件</span></div>
  </div>

  <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4"></div>
</div>

<script>
let games = [];

async function loadGames() {
  const response = await fetch('games.json?v=' + Date.now());
  games = await response.json();
  render();
}

const q = document.getElementById('q');
const players = document.getElementById('players');
const time = document.getElementById('time');
const weight = document.getElementById('weight');
const sort = document.getElementById('sort');
const grid = document.getElementById('grid');
const count = document.getElementById('count');

function parseTime(t){
  if(!t) return 999;
  const str = String(t);
  // 「30-60分」「30〜60分」「30~60分」みたいな範囲表記から最大値を取得
  const range = str.match(/(\d+)\s*[-〜~]\s*(\d+)/);
  if(range) return parseInt(range[2]);
  // 単体の数値
  const single = str.match(/(\d+)/);
  return single ? parseInt(single[1]) : 999;
}

function render(){
  let list = games.slice();
  const query = q.value.trim().toLowerCase();
  if(query) list = list.filter(g => g.name.toLowerCase().includes(query));
  
  if(players.value){
    const n = parseInt(players.value);
    list = list.filter(g => (g.pmin||0) <= n && (g.pmax||99) >= n);
  }
  if(time.value){
    const range = time.value;
    list = list.filter(g => {
      const t = parseTime(g.time);
      if(range === '0-30') return t <= 30;
      if(range === '30-90') return t > 30 && t <= 90;
      if(range === '90+') return t > 90;
      return true;
    });
  }
  if(weight.value){
    const w = parseInt(weight.value);
    list = list.filter(g => g.weight === w);
  }
  
  switch(sort.value){
    case 'players': list.sort((a,b)=> (a.pmin-b.pmin)||a.name.localeCompare(b.name,'ja')); break;
    case 'time': list.sort((a,b)=> parseTime(a.time)-parseTime(b.time)); break;
    case 'weight': list.sort((a,b)=> (a.weight-b.weight)||a.name.localeCompare(b.name,'ja')); break;
    default: list.sort((a,b)=> a.name.localeCompare(b.name,'ja'));
  }
  
  count.textContent = `表示中: ${list.length}件`;
  
  grid.innerHTML = list.map(g => `
grid.innerHTML = list.map(g => `
  <a href="${g.url}" target="_blank" class="group block bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 overflow-hidden hover:shadow-md transition relative">

    ${g.genre ? `<div class="absolute top-2 right-2 text-[10px] px-2 py-0.5 bg-black/80 text-white rounded">${g.genre}</div>` : ``}

    <div class="aspect-[4/3] bg-slate-100 overflow-hidden">
      <img src="images/${g.img}" alt="${g.name}" class="w-full h-full object-cover group-hover:scale-105 transition" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
    </div>

    <div class="p-3">
      <h3 class="font-medium text-[13px] leading-snug line2 min-h-[2.5rem]">${g.name}</h3>
      <div class="mt-2">
        <div class="grid grid-cols-3 divide-x divide-slate-300 text-center">
          <div>
            <div class="text-[9px] text-slate-400 leading-none">人数</div>
            <div class="text-[11px] font-medium text-slate-700 mt-0.5">${g.players||'-'}</div>
          </div>
          <div>
            <div class="text-[9px] text-slate-400 leading-none">時間</div>
            <div class="text-[11px] font-medium text-slate-700 mt-0.5">${g.time||'-'}</div>
          </div>
          <div>
            <div class="text-[9px] text-slate-400 leading-none">重さ</div>
            <div class="text-[11px] font-medium text-slate-700 mt-0.5">${g.weight||'-'}</div>
          </div>
        </div>
      </div>
    </div>
  </a>
`).join('');
}

[q,players,time,weight,sort].forEach(el => el.addEventListener('input', render));
loadGames();
</script>
</body>
</html>
