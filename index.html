<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>892-BoardGameList</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; }
.line2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
</style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

<div class="max-w-7xl mx-auto px-4 pb-16">

  <header class="py-8 text-center relative">
    <div class="absolute right-0 top-8">
      <a href="admin.html" class="text-[12px] text-slate-500 border rounded px-2 py-1 bg-white">管理</a>
    </div>
    <h1 class="text-3xl font-bold">所持ボドゲ一覧</h1>
    <p class="text-sm text-slate-500 mt-1">ジャンルラベル付き</p>
  </header>

  <!-- フィルター -->
  <div class="bg-white rounded-xl p-4 mb-6">
    <input id="q" placeholder="検索..." class="border px-3 py-2 rounded w-full">
  </div>

  <!-- グリッド -->
  <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

</div>

<script>
let games = [];

async function loadGames() {
  const res = await fetch('games.json?v=' + Date.now());
  games = await res.json();
  render();
}

const q = document.getElementById('q');
const grid = document.getElementById('grid');

q.addEventListener('input', render);

function render() {
  const keyword = q.value.toLowerCase();

  const filtered = games.filter(g =>
    g.name.toLowerCase().includes(keyword)
  );

  grid.innerHTML = filtered.map(g => `
    <div class="bg-white rounded-xl overflow-hidden shadow">

      <!-- 画像 + ジャンルラベル -->
      <div class="relative">
        <img src="images/${g.img}" class="w-full aspect-[3/4] object-cover">

        ${g.genre ? `
          <div class="absolute top-1 right-1 bg-black/70 text-white text-[10px] px-2 py-0.5 rounded">
            ${g.genre}
          </div>
        ` : ""}
      </div>

      <!-- テキスト -->
      <div class="p-2">
        <div class="text-xs font-bold line2">${g.name}</div>
        <div class="text-[10px] text-slate-500 mt-1">
          ${g.players} / ${g.time}
        </div>
      </div>

    </div>
  `).join('');
}

loadGames();
</script>

</body>
</html>
