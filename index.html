grid.innerHTML = list.map(g => `
  <a href="${g.url}" target="_blank" class="group block bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 overflow-hidden hover:shadow-md transition relative">

    <div class="aspect-[4/3] bg-slate-100 overflow-hidden relative">
      <img src="images/${g.img}" alt="${g.name}" class="w-full h-full object-cover group-hover:scale-105 transition" onerror="this.src='https://placehold.co/400x300?text=No+Image'">

      ${(g.genres && g.genres.length)
        ? `<div class="absolute bottom-2 right-2 flex flex-wrap gap-1 justify-end max-w-[80%]">
            ${g.genres.map(tag => `
              <span class="text-[10px] px-2 py-0.5 bg-black/80 text-white rounded whitespace-nowrap">
                ${tag}
              </span>
            `).join('')}
           </div>`
        : ``}
    </div>

    <div class="p-3">
      <h3 class="font-medium text-[13px] leading-snug line2 min-h-[2.5rem]">${g.name}</h3>
      <div class="mt-2">
        <div class="grid grid-cols-3 divide-x divide-slate-300 text-center">
          <div>
            <div class="text-[9px] text-slate-400 leading-none">人数</div>
            <div class="text-[11px] font-medium text-slate-700 mt-0.5">${g.players||'-'}</div>
          </div>
          <div>
            <div class="text-[9px] text-slate-400 leading-none">時間</div>
            <div class="text-[11px] font-medium text-slate-700 mt-0.5">${g.time||'-'}</div>
          </div>
          <div>
            <div class="text-[9px] text-slate-400 leading-none">重さ</div>
            <div class="text-[11px] font-medium text-slate-700 mt-0.5">${g.weight||'-'}</div>
          </div>
        </div>
      </div>
    </div>

  </a>
`).join('');
