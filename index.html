<script>
const $ = (s)=>document.querySelector(s);
const grid = $('#grid');
const countEl = $('#count');
let games = [];
let state = { players:'', weight:'', sort:'name', search:'' };

function parseTime(t){ const m = String(t||'').match(/\d+/); return m ? parseInt(m[0],10) : 999; }
function weightBadge(w){
  const n = Number(w)||0;
  if(n===1) return 'bg-emerald-50 text-emerald-700 ring-emerald-200';
  if(n===2) return 'bg-amber-50 text-amber-700 ring-amber-200';
  return 'bg-slate-50 text-slate-700 ring-slate-200';
}
function esc(s){ return String(s).replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

function applyFilters(){
  grid.style.opacity = '0.4';
  setTimeout(()=>{
    const term = state.search.trim().toLowerCase();
    let list = games.filter(g=>{
      if(term && !g.name.toLowerCase().includes(term)) return false;
      if(state.weight && String(g.weight) !== state.weight) return false;
      if(state.players){
        if(state.players==='10'){
          if(!((g.pmax||0)>=10 || (g.pmin||0)>=10)) return false;
        }else{
          const n = parseInt(state.players,10);
          if(!((g.pmin||0)<=n && (g.pmax||999)>=n)) return false;
        }
      }
      return true;
    });

    switch(state.sort){
      case 'players': list.sort((a,b)=> (a.pmin-b.pmin)||(a.pmax-b.pmax)||a.name.localeCompare(b.name,'ja')); break;
      case 'time': list.sort((a,b)=> parseTime(a.time)-parseTime(b.time)||a.name.localeCompare(b.name,'ja')); break;
      case 'weight': list.sort((a,b)=> (a.weight-b.weight)||a.name.localeCompare(b.name,'ja')); break;
      case 'id': list.sort((a,b)=> (a.id||0)-(b.id||0)); break;
      default: list.sort((a,b)=> a.name.localeCompare(b.name,'ja'));
    }

    countEl.textContent = `表示中: ${list.length}件`;
    if(list.length===0){
      grid.innerHTML = `<div class="col-span-full text-center py-20"><div class="inline-flex flex-col items-center gap-2 text-slate-500"><div class="text-4xl">🙈</div><p class="text-sm">該当するゲームがありません</p></div></div>`;
      grid.style.opacity='1';
      return;
    }

    const frag = document.createDocumentFragment();
    for(const g of list){
      const img = `https://boardgame-public.s3.ap-northeast-1.amazonaws.com/${encodeURIComponent(g.img||'')}`;
      const fallback = `https://placehold.co/400x400/e2e8f0/475569?text=${encodeURIComponent(g.name.slice(0,10))}`;
      const card = document.createElement('div');
      card.className = 'group bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 overflow-hidden flex flex-col';
      card.innerHTML = `
        <a href="${esc(g.url)}" target="_blank" rel="noopener" class="relative block aspect-square bg-slate-100 overflow-hidden">
          <img src="${img}" alt="${esc(g.name)}" loading="lazy" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.onerror=null;this.src='${fallback}'">
        </a>
        <div class="p-3 flex-1 flex flex-col">
          <h3 class="font-semibold text-[14px] leading-snug text-slate-900 line2 min-h-[40px]">
            <a href="${esc(g.url)}" target="_blank" rel="noopener" class="hover:text-indigo-600 transition-colors">${esc(g.name)}</a>
          </h3>
          <div class="mt-auto pt-2 flex items-center justify-between text-[12px] text-slate-600">
            <span class="inline-flex items-center gap-1">👥 ${esc(g.players||'')}</span>
            <span class="inline-flex items-center gap-1">⏱ ${esc(g.time||'')}</span>
          </div>
          <div class="mt-1.5">
            <span class="inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full ring-1 ${weightBadge(g.weight)}">⚖️ 重さ: ${esc(g.weight)}</span>
          </div>
        </div>`;
      frag.appendChild(card);
    }
    grid.innerHTML = '';
    grid.appendChild(frag);
    grid.style.opacity = '1';
  }, 80);
}

function debounce(fn, wait){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }

$('#filterPlayers').addEventListener('change', e=>{ state.players=e.target.value; applyFilters(); });

$('#search').addEventListener('input', debounce(e=>{ state.search=e.target.value; applyFilters(); }, 180));
