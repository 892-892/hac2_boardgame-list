<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・ボードゲームコレクション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Board Game Collection</h1>
    </header>

    <main id="game-list" class="grid-container">
        </main>

    <script>
        // CSVファイルを読み込んで画面に表示するプログラム
        async function loadGames() {
            const response = await fetch('data.csv');
            const data = await response.text();
            const rows = data.split('\n').slice(1); // 1行目（ヘッダー）を飛ばす

            const listContainer = document.getElementById('game-list');

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length < 7) return; // データが足りない行は無視

                // CSVの各列を割り当て
                const [name, url, players, time, weight, id, image] = cols;

                // カードのHTMLを作成
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="${url}" target="_blank">
                        <img src="images/${image.trim()}" alt="${name}" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                        <div class="card-content">
                            <h3>${name}</h3>
                            <p>👥 ${players} | ⏱️ ${time}</p>
                            <p>⚖️ 重さ: ${weight}</p>
                        </div>
                    </a>
                `;
                listContainer.appendChild(card);
            });
        }

        loadGames();
    </script>
</body>
</html>
