<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

    <div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 p-4 md:p-5 mb-6">

          <label class="block text-xs font-medium text-slate-600 mb-1.5">重さ</label>
          <select id="filterWeight" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
            <option value="">すべて</option>

<script>
const $ = (s)=>document.querySelector(s);
const grid = $('#grid');
const countEl = $('#count');
let games = [];
let state = { players:'', weight:'', sort:'name', search:'' };

function parseTime(t){ const m = String(t||'').match(/\d+/); return m ? parseInt(m[0],10) : 999; }
function weightBadge(w){
  const n = Number(w)||0;
  if(n===1) return 'bg-emerald-50 text-emerald-700 ring-emerald-200';
  if(n===2) return 'bg-amber-50 text-amber-700 ring-amber-200';
  return 'bg-slate-50 text-slate-700 ring-slate-200';
}
function esc(s){ return String(s).replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

function applyFilters(){
  grid.style.opacity = '0.4';
  setTimeout(()=>{
    const term = state.search.trim().toLowerCase();
    let list = games.filter(g=>{
      if(term && !g.name.toLowerCase().includes(term)) return false;
      if(state.weight && String(g.weight) !== state.weight) return false;
      if(state.players){
        if(state.players==='10'){
          if(!((g.pmax||0)>=10 || (g.pmin||0)>=10)) return false;
        }else{
          const n = parseInt(state.players,10);
          if(!((g.pmin||0)<=n && (g.pmax||999)>=n)) return false;
        }
      }
      return true;
    });

    switch(state.sort){
      case 'players': list.sort((a,b)=> (a.pmin-b.pmin)||(a.pmax-b.pmax)||a.name.localeCompare(b.name,'ja')); break;
      case 'time': list.sort((a,b)=> parseTime(a.time)-parseTime(b.time)||a.name.localeCompare(b.name,'ja')); break;
      case 'weight': list.sort((a,b)=> (a.weight-b.weight)||a.name.localeCompare(b.name,'ja')); break;
      case 'id': list.sort((a,b)=> (a.id||0)-(b.id||0)); break;
      default: list.sort((a,b)=> a.name.localeCompare(b.name,'ja'));
    }

    countEl.textContent = `表示中: ${list.length}件`;
    if(list.length===0){
      grid.innerHTML = `<div class="col-span-full text-center py-20"><div class="inline-flex flex-col items-center gap-2 text-slate-500"><div class="text-4xl">🙈</div><p class="text-sm">該当するゲームがありません</p></div></div>`;
      grid.style.opacity='1';
      return;
    }

    const frag = document.createDocumentFragment();
    for(const g of list){
      const img = `images/${g.id}.jpg`;
      const fallback = `https://placehold.co/600x600/111111/eeeeee?text=${encodeURIComponent(g.name)}`;
      const card = document.createElement('div');
      card.className = 'group bg-white border border-slate-200 rounded-xl overflow-hidden hover:border-slate-900 transition-colors duration-200';
      card.innerHTML = `
        <a href="${esc(g.url)}" target="_blank" rel="noopener" class="block aspect-[4/3] bg-neutral-100 overflow-hidden">
          <img src="${img}" alt="${esc(g.name)}" loading="lazy" class="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-300" onerror="this.onerror=null;this.src='${fallback}'">
        </a>
        <div class="p-3">
          <h3 class="text-[15px] font-medium leading-snug text-slate-900 truncate">
            <a href="${esc(g.url)}" target="_blank" rel="noopener" class="hover:underline underline-offset-2">${esc(g.name)}</a>
          </h3>
          <div class="mt-1.5 text-[12px] text-slate-500 tracking-wide">
            ${esc(g.players)}人 ・ ${esc(g.time)} ・ 重さ${esc(g.weight)}
          </div>
        </div>`;
      frag.appendChild(card);
    }
    grid.innerHTML = '';
    grid.appendChild(frag);
    grid.style.opacity = '1';
  }, 80);
}

function debounce(fn, wait){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }
